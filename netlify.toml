[build]
  command = "npm run build"
  publish = "dist/public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."supabase-keepalive"]
  schedule = "0 */6 * * *"

# Exclude Netlify Functions from SPA redirect (critical for cron/scheduled functions)
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Redirect all routes to index.html for SPA routing (wouter/React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables (configure these in Netlify dashboard)
# VITE_SUPABASE_URL
# VITE_SUPABASE_ANON_KEY
# VITE_CAKTO_CHECKOUT_URL
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY

# Note:
# - Variáveis com prefixo VITE_ ficam expostas no frontend.
# - SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY podem ser usadas no runtime de Functions do Netlify,
#   sem prefixo VITE_, para manter segredos no backend.
